# .github/workflows/spec-engine.yml
# Added by the SRE Frameworks team — API Explorer catalog integration.
# Generates and publishes an OpenAPI 3.1 spec on every push to main.
# No application code changes are required.
#
# Prerequisites (set in repo Settings → Secrets and variables → Actions):
#   Secrets:  EXPLORER_API_TOKEN   — API token for the Explorer catalog
#   Variables: API_GATEWAY         — e.g. "kong-prod"
#              API_OWNER           — e.g. "@payments-team"
#
# Questions? Contact the SRE Frameworks team.

name: Generate OpenAPI Spec

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  generate-spec:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install spec-engine and validators
        run: |
          pip install spec-engine --quiet
          npm install -g @redocly/cli @stoplight/spectral-cli --silent

      - name: Generate and publish spec
        run: |
          FRAMEWORK_FLAG=""
          if [ -n "${{ vars.API_FRAMEWORK }}" ]; then
            FRAMEWORK_FLAG="--framework ${{ vars.API_FRAMEWORK }}"
          fi
          spec-engine generate \
            --repo . \
            --gateway "${{ vars.API_GATEWAY || 'unknown' }}" \
            --owner   "${{ vars.API_OWNER   || github.repository_owner }}" \
            --out openapi.yaml \
            $FRAMEWORK_FLAG \
            --publish \
            --verbose
        env:
          EXPLORER_API_TOKEN: ${{ secrets.EXPLORER_API_TOKEN }}

      - name: Upload spec artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-spec
          path: openapi.yaml
          retention-days: 30
          if-no-files-found: warn
